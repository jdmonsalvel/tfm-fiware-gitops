# Credentials Config Service — configuración de credenciales aceptadas
# H2 in-memory para demo local (sin persistencia)
# En AWS: persistence: true + MySQL/Postgres externo
database:
  persistence: false

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: ccs.127.0.0.1.nip.io
      paths:
        - /
  tls: []

deployment:
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 300m
