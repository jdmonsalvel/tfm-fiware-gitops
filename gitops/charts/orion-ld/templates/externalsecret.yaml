apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orion-mongo-uri
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: orion-mongo-uri
    creationPolicy: Owner
  data:
    - secretKey: mongo-uri
      remoteRef:
        key: /tfm-fiware/prod/orion/mongo-uri
